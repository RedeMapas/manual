apiVersion: v1
kind: Service
metadata:
  name: {{ include "manual.fullname" . }}
  labels:
    {{- include "manual.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort | default 3000 }}
      protocol: TCP
      name: http
  selector:
    {{- include "manual.selectorLabels" . | nindent 4 }}
