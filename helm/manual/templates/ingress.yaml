{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "manual.fullname" . }}
  labels:
    {{- include "manual.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- if .Values.ingress.hosts }}
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "manual.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
    {{- else }}
    {{- /* Generate host based on baseDomain for manual */}}
    {{- $baseDomain := .Values.ingress.baseDomain | default "mapas.tec.br" }}
    {{- $useNamespacePrefix := .Values.ingress.namespacePrefix | default false }}
    {{- /* Single host for manual: manual.mapas.tec.br */}}
    {{- if $useNamespacePrefix }}
    - host: {{ printf "%s-%s.%s" (include "manual.fullname" .) .Release.Namespace $baseDomain | quote }}
    {{- else }}
    - host: {{ printf "manual.%s" $baseDomain | quote }}
    {{- end }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "manual.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
    {{- end }}
{{- end }}
